<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="CalyHealth icon">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="15" fill="#0B3D3D"/>

  <!-- C mark — white, center (32,32), radius 17, opens ±52° right -->
  <!-- Top tip  : (32 + 17·cos(-52°), 32 + 17·sin(-52°)) = (42.5, 18.6) -->
  <!-- Bottom tip: (42.5, 45.4)                                           -->
  <path d="M 42.5 18.6 A 17 17 0 1 0 42.5 45.4"
        stroke="#FFFFFF" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Gold accent dots at arc tips -->
  <circle cx="42.5" cy="18.6" r="3.8" fill="#C9A84C"/>
  <circle cx="42.5" cy="45.4" r="3.8" fill="#C9A84C"/>
</svg>
